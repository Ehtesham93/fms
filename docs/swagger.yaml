        "400":
          description: "Bad Request - Invalid input parameters"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INPUT_ERROR"
                      errdata:
                        type: object
                  data:
                    type: "null"
                  msg:
                    type: string
        "403":
          description: "Forbidden - Authentication required"
        "500":
          description: "Internal Server Error"
