  - name: FMS JS > FMS > FleetInsights

paths:
  /api/v1/platform/modules:
    get:
      tags:
        - FMS JS > Platform
      summary: Get Console Modules
      description: Get all platform modules available for console access
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Console permissions fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      userid:
                        type: string
                        description: User ID
                      modules:
                        type: array
                        description: Array of platform modules
                        items:
                          type: object
                          properties:
                            moduleid:
                              type: string
                              description: Module ID
                            moduleinfo:
                              type: object
                              description: Module information including name, type, and other details
                              properties:
                                moduleid:
                                  type: string
                                  description: Module ID
                                modulename:
                                  type: string
                                  description: Module name
                                moduletype:
                                  type: string
                                  description: Module type (e.g., platform)
                                modulecode:
                                  type: string
                                  description: Module code
                                moduleinfo:
                                  type: object
                                  description: Additional module information
                                creditspervehicleday:
                                  type: number
                                  description: Credits per vehicle per day
                                isenabled:
                                  type: boolean
                                  description: Whether module is enabled
                  msg:
                    type: string
                    example: "Console permissions fetched successfully"
        "400":
          description: Bad Request - Invalid input data
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INPUT_ERROR"
                      errdata:
                        type: string
                        example: "Invalid User ID format"
                  msg:
                    type: string
                    example: "Invalid input data"
        "403":
          description: Forbidden - Insufficient permissions
        "500":
          description: Internal Server Error - Get console permissions failed

  /api/v1/fms/account/modules:
    get:
      tags:
        - FMS JS > FMS > AccountMangement
      summary: Get Account Modules
      description: Get all web modules available for the account with their information
      security:
        - cookieAuth: []
      responses:
        "200":
          description: FMS permissions fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      userid:
                        type: string
                        description: User ID
                      accountid:
                        type: string
                        description: Account ID
                      modules:
                        type: array
                        description: Array of available modules
                        items:
                          type: object
                          properties:
                            moduleid:
                              type: string
                              description: Module ID
                            moduleinfo:
                              type: object
                              description: Module information including name, type, and other details
                              properties:
                                moduleid:
                                  type: string
                                  description: Module ID
                                modulename:
                                  type: string
                                  description: Module name
                                moduletype:
                                  type: string
                                  description: Module type (e.g., web)
                                modulecode:
                                  type: string
                                  description: Module code
                                moduleinfo:
                                  type: object
                                  description: Additional module information
                                creditspervehicleday:
                                  type: number
                                  description: Credits per vehicle per day
                                isenabled:
                                  type: boolean
                                  description: Whether module is enabled
                  msg:
                    type: string
                    example: "FMS permissions fetched successfully"
        "400":
          description: Bad Request - Invalid input data
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INPUT_ERROR"
                      errdata:
                        type: string
                        example: "Invalid User ID format"
                  msg:
                    type: string
                    example: "Invalid input data"
        "403":
          description: Forbidden - Insufficient permissions
        "500":
          description: Internal Server Error - Get FMS permissions failed

  /api/v1/fms/fleetinsights/vehicle/allinsights:
    post:
      tags:
        - FMS JS > FMS > FleetInsights
      summary: Get All Vehicle Insights
      description: Retrieve comprehensive insights (charging sessions, distance travelled, trips, energy consumed, charging deviations) for one or multiple vehicles within a specified time range
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vinnumbers
                - starttime
                - endtime
              properties:
                vinnumbers:
                  oneOf:
                    - type: string
                      minLength: 1
                      maxLength: 128
                      description: "Single VIN number"
                      example: "WBAFW31050F123456"
                    - type: array
                      items:
                        type: string
                        minLength: 1
                        maxLength: 128
                      minItems: 1
                      description: "Array of VIN numbers"
                      example:
                        [
                          "WBAFW31050F123456",
                          "WBAFW31050F123457",
                          "WBAFW31050F123458",
                        ]
                  description: "Single VIN number or array of VIN numbers for which to get insights"
                starttime:
                  type: integer
                  description: "Start time in milliseconds (timestamp). Must be less than endtime"
                  example: 1716150000000
                endtime:
                  type: integer
                  description: "End time in milliseconds (timestamp). Must be greater than starttime"
                  example: 1716236400000
                filter:
                  type: string
                  description: "Optional filter to specify which insights to retrieve"
                  enum:
                    [
                      "all",
                      "distancetravelled",
                      "chargingsessions",
                      "energyconsumed",
                      "trips",
                      "chargingdeviation",
                    ]
                  default: "all"
                  example: "all"
      responses:
        "200":
          description: "Vehicle insights retrieved successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: object
                    properties:
                      totalchargingsessions:
                        type: number
                        description: "Total number of charging sessions"
                        example: 45
                      totaldistancetravelled:
                        type: number
                        description: "Total distance travelled in km"
                        example: 1250.5
                      totaltrips:
                        type: number
                        description: "Total number of trips"
                        example: 89
                      totalenergyconsumed:
                        type: number
                        description: "Total energy consumed in kWh"
                        example: 425.8
                      totalchargingdeviation:
                        type: number
                        description: "Total charging deviations"
                        example: 3
                      treesaved:
                        type: number
                        description: "Trees saved equivalent"
                        example: 12.5
                      co2emissionssaved:
                        type: number
                        description: "CO2 emissions saved in kg"
                        example: 250.3
                      fuelcostsaved:
                        type: number
                        description: "Fuel cost saved in currency units"
                        example: 5000.75
                      distancetravelled:
                        type: object
                        description: "Distance travelled breakdown (only if filter is 'all' or 'distancetravelled')"
                        additionalProperties: true
                      chargingsessions:
                        type: object
                        description: "Charging sessions breakdown (only if filter is 'all' or 'chargingsessions')"
                        additionalProperties: true
                      trips:
                        type: object
                        description: "Trips breakdown (only if filter is 'all' or 'trips')"
                        additionalProperties: true
                      energyconsumed:
                        type: object
                        description: "Energy consumed breakdown (only if filter is 'all' or 'energyconsumed')"
                        additionalProperties: true
                      chargingdeviation:
                        type: object
                        description: "Charging deviation breakdown (only if filter is 'all' or 'chargingdeviation')"
                        additionalProperties: true
                  msg:
                    type: string
                    example: "SUCCESS"
        "400":
          description: "Bad Request - Invalid input parameters"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INPUT_ERROR", "INVALID_TIME_RANGE"]
                        example: "INPUT_ERROR"
                      errdata:
                        type: string
                        example: "starttime must be less than endtime"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Invalid input data"
        "403":
          description: "Forbidden - Account token authentication required"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "TOKEN_REQUIRED"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Account token is required"
        "500":
          description: "Internal Server Error - Failed to retrieve insights"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INTERNAL_ERROR"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Failed to get vehicle insights"

  /api/v1/fms/account/fleet:
    post:
      tags:
        - FMS JS > FMS > AccountMangement > Fleet
      summary: Create Fleet
      description: Create a new fleet under the specified account
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fleetname
              properties:
                fleetname:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: "Name of the fleet to create"
                  example: "West Coast Fleet"
                parentfleetid:
                  type: string
                  format: uuid
                  description: "Optional parent fleet ID if creating a sub-fleet"
                  example: "16d1bfc0-249f-41a9-b894-57f9630d8135"
      responses:
        "200":
          description: "Fleet created successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      fleetid:
                        type: string
                        format: uuid
                        description: "ID of the created fleet"
                      fleetname:
                        type: string
                        description: "Name of the created fleet"
                      parentfleetid:
                        type: string
                        format: uuid
                        description: "Parent fleet ID if applicable"
                  msg:
                    type: string
                    example: "Fleet created successfully"
        "400":
          description: "Bad Request - Invalid input parameters"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INPUT_ERROR"
                      errdata:
                        type: string
                        example: "fleetname cannot be empty"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Invalid input data"
        "403":
          description: "Forbidden - Insufficient permissions"
        "500":
          description: "Internal Server Error - Fleet creation failed"

