  /api/v1/fms/account/vehicle/{vinno}/shared:
    get:
      tags:
        - FMS > Account Management > Vehicles
      summary: Get Shared Accounts for Vehicle
      description: Retrieve detailed information about a specific vehicle and all accounts it has been shared with. This shows which accounts currently have access to the specified vehicle, including sharing metadata and account details. The vehicle must belong to the current account. Requires account fleet view or admin permissions.
      parameters:
        - in: path
          name: vinno
          required: true
          schema:
            type: string
          description: Vehicle VIN number (alphanumeric with spaces, max 128 chars)
          example: "MA1LD1234567890123"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Shared accounts fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  vehicleinfo:
                    type: object
                    properties:
                      vinno:
                        type: string
                        description: Vehicle VIN number
                        example: "MA1LD1234567890123"
                      regno:
                        type: string
                        description: Vehicle registration number (license plate or VIN if no license plate)
                        example: "MH12AB1234"
                      isowner:
                        type: boolean
                        description: Whether the current account is the owner of the vehicle
                        example: true
                      accvininfo:
                        type: object
                        nullable: true
                        description: Account-specific vehicle information
                        additionalProperties: true
                      assignedat:
                        type: string
                        format: date-time
                        description: When the vehicle was assigned to the fleet
                      updatedat:
                        type: string
                        format: date-time
                        description: When the vehicle record was last updated
                      vehiclevariant:
                        type: string
                        description: Vehicle variant/trim level
                        example: "LX 4WD"
                      vehiclemodel:
                        type: string
                        description: Vehicle model name
                        example: "Thar"
                      modelcode:
                        type: string
                        description: Vehicle model code
                        example: "THR_LX_4WD"
                      modeldisplayname:
                        type: string
                        nullable: true
                        description: Human-readable model display name
                        example: "Thar LX 4WD"
                      vehicleinfo:
                        type: object
                        nullable: true
                        description: Additional vehicle information
                        additionalProperties: true
                      delivered_date:
                        type: string
                        nullable: true
                        description: Vehicle delivery date
                      vehicle_city:
                        type: string
                        nullable: true
                        description: Vehicle city/location
                      assignedby:
                        type: string
                        description: Display name of user who assigned the vehicle
                        example: "John Doe"
                      updatedby:
                        type: string
                        description: Display name of user who last updated the vehicle
                        example: "Jane Smith"
                    description: Comprehensive vehicle information
                  sharedaccounts:
                    type: array
                    items:
                      type: object
                      properties:
                        dstaccountid:
                          type: string
                          format: uuid
                          description: UUID of the destination account that has access
                          example: "16d1bfc0-249f-41a9-b894-57f9630d8135"
                        taggedat:
                          type: string
                          format: date-time
                          description: When the vehicle was shared with this account
                          example: "2024-03-15T10:30:00Z"
                        allow_retag:
                          type: boolean
                          description: Whether this account can re-share the vehicle to other accounts
                          example: false
                        isactive:
                          type: boolean
                          description: Whether the sharing relationship is currently active
                          example: true
                        accountname:
                          type: string
                          description: Name of the destination account
                          example: "Partner Fleet Corp"
                        accounttype:
                          type: string
                          description: Type of the destination account
                          example: "corporate"
                        accountinfo:
                          type: object
                          nullable: true
                          description: Additional account information
                          additionalProperties: true
                        tagged_by_user:
                          type: string
                          description: Display name of the user who shared the vehicle
                          example: "Admin User"
                        tagged_by_userid:
                          type: string
                          format: uuid
                          description: UUID of the user who shared the vehicle
                          example: "22e2cfc1-359g-42b0-c905-68g9640e9246"
                    description: Array of accounts that have access to this vehicle, sorted by sharing date (newest first)
                description: Complete vehicle information and all accounts it has been shared with
        "400":
          description: Bad Request - Invalid account ID or VIN format
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INPUT_ERROR", "VEHICLE_NOT_FOUND"]
                        example: "INPUT_ERROR"
                      errdata:
                        type: object
                        description: Validation error details
                  msg:
                    type: string
                    enum:
                      - "Invalid Account ID format"
                      - "Invalid VIN format"
                      - "VIN cannot be empty"
                      - "VIN must contain only letters, numbers, and spaces, and must not start or end with a space"
                      - "VIN must not exceed 128 characters"
                      - "Vehicle not found in this account"
                    example: "Vehicle not found in this account"
        "403":
          description: Forbidden - Insufficient permissions (requires account.fleets.view or account.fleets.admin)
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INSUFFICIENT_PERMISSIONS"]
                        example: "INSUFFICIENT_PERMISSIONS"
                  msg:
                    type: string
                    example: "You don't have permission to view shared accounts."
        "500":
          description: Internal Server Error - Failed to get shared accounts
