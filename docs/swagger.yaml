  /api/v1/platform/account/{accountid}/subscription/cost:
    post:
      tags:
        - FMS JS > Platform > Accounts > Subscriptions
      summary: Calculate Sub Cost
      parameters:
        - in: path
          name: accountid
          required: true
          schema:
            type: string
            format: uuid
            description: Account ID (must be a valid UUID)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pkgid:
                  type: string
                  maxLength: 128
                  description: Package ID for cost calculation
                vehdays:
                  type: number
                  minimum: 1
                  description: Number of vehicle days
                discountpercent:
                  type: number
                  default: 0
                  description: Discount percentage (0-100)
                startdatems:
                  type: number
                  description: Start date in milliseconds (Unix timestamp)
                enddatems:
                  type: number
                  description: End date in milliseconds (Unix timestamp)
              required:
                - pkgid
                - vehdays
                - startdatems
                - enddatems
              example:
                pkgid: "609447f7-203a-4749-af92-a7b730b34088"
                vehdays: 5
                discountpercent: 1
                startdatems: 1746057600000
                enddatems: 1748649600000
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      pkgid:
                        type: string
                        description: Package ID
                      vehdays:
                        type: number
                        description: Number of vehicle days
                      discountpercent:
                        type: number
                        description: Applied discount percentage
                      startdate:
                        type: number
                        description: Start date in milliseconds
                      enddate:
                        type: number
                        description: End date in milliseconds
                      days:
                        type: number
                        description: Total number of days
                      totalcredits:
                        type: number
                        description: Total credits required
                      discountcredits:
                        type: number
                        description: Credits saved due to discount
                      billablecredits:
                        type: number
                        description: Final billable credits
                      billablecost:
                        type: number
                        description: Final cost to be charged
                  msg:
                    type: string
                    example: "Subscription cost calculated successfully"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: INPUT_ERROR
                      errdata:
                        type: string
                      message:
                        type: string
                  data:
                    type: "null"
                  msg:
                    type: string
        "403":
          description: Forbidden - Insufficient permissions
        "404":
          description: Not Found - Account or package not found
