paths:
  /api/v1/platform/modules:
    get:
      tags:
        - FMS JS > Platform
      summary: Get Console Modules
      description: Get all platform modules available for console access
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Console permissions fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      userid:
                        type: string
                        description: User ID
                      modules:
                        type: array
                        description: Array of platform modules
                        items:
                          type: object
                          properties:
                            moduleid:
                              type: string
                              description: Module ID
                            moduleinfo:
                              type: object
                              description: Module information including name, type, and other details
                              properties:
                                moduleid:
                                  type: string
                                  description: Module ID
                                modulename:
                                  type: string
                                  description: Module name
                                moduletype:
                                  type: string
                                  description: Module type (e.g., platform)
                                modulecode:
                                  type: string
                                  description: Module code
                                moduleinfo:
                                  type: object
                                  description: Additional module information
                                creditspervehicleday:
                                  type: number
                                  description: Credits per vehicle per day
                                isenabled:
                                  type: boolean
                                  description: Whether module is enabled
                  msg:
                    type: string
                    example: "Console permissions fetched successfully"
        "400":
          description: Bad Request - Invalid input data
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INPUT_ERROR"
                      errdata:
                        type: string
                        example: "Invalid User ID format"
                  msg:
                    type: string
                    example: "Invalid input data"
        "403":
          description: Forbidden - Insufficient permissions
        "500":
          description: Internal Server Error - Get console permissions failed

  /api/v1/fms/account/modules:
    get:
      tags:
        - FMS JS > FMS > AccountMangement
      summary: Get Account Modules
      description: Get all web modules available for the account with their information
      security:
        - cookieAuth: []
      responses:
        "200":
          description: FMS permissions fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      userid:
                        type: string
                        description: User ID
                      accountid:
                        type: string
                        description: Account ID
                      modules:
                        type: array
                        description: Array of available modules
                        items:
                          type: object
                          properties:
                            moduleid:
                              type: string
                              description: Module ID
                            moduleinfo:
                              type: object
                              description: Module information including name, type, and other details
                              properties:
                                moduleid:
                                  type: string
                                  description: Module ID
                                modulename:
                                  type: string
                                  description: Module name
                                moduletype:
                                  type: string
                                  description: Module type (e.g., web)
                                modulecode:
                                  type: string
                                  description: Module code
                                moduleinfo:
                                  type: object
                                  description: Additional module information
                                creditspervehicleday:
                                  type: number
                                  description: Credits per vehicle per day
                                isenabled:
                                  type: boolean
                                  description: Whether module is enabled
                  msg:
                    type: string
                    example: "FMS permissions fetched successfully"
        "400":
          description: Bad Request - Invalid input data
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INPUT_ERROR"
                      errdata:
                        type: string
                        example: "Invalid User ID format"
                  msg:
                    type: string
                    example: "Invalid input data"
        "403":
          description: Forbidden - Insufficient permissions
        "500":
          description: Internal Server Error - Get FMS permissions failed

  /api/v1/fms/account/overview:
    get:
      tags:
        - FMS JS > FMS > AccountMangement
      summary: Get Account Overview
      description: Get comprehensive overview of account including fleet count, vehicle count, user count, subscription info and root fleet details
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Account overview fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: object
                    properties:
                      accountid:
                        type: string
                        format: uuid
                        description: Account ID
                        example: "12345678-1234-1234-1234-123456789012"
                      accountname:
                        type: string
                        description: Account name
                        example: "Test Company Ltd"
                      createdby:
                        type: string
                        format: uuid
                        description: User ID who created the account
                        example: "12345678-1234-1234-1234-123456789012"
                      createdat:
                        type: string
                        format: date-time
                        description: Account creation timestamp
                        example: "2024-01-01T00:00:00.000Z"
                      updatedby:
                        type: string
                        format: uuid
                        description: User ID who last updated the account
                        example: "12345678-1234-1234-1234-123456789012"
                      updatedat:
                        type: string
                        format: date-time
                        description: Account last update timestamp
                        example: "2024-01-01T00:00:00.000Z"
                      fleetcount:
                        type: integer
                        description: Total number of fleets in the account
                        example: 5
                      vehiclecount:
                        type: integer
                        description: Total number of vehicles in the account
                        example: 25
                      usercount:
                        type: integer
                        description: Total number of users in the account
                        example: 10
                      subscribedvehiclecount:
                        type: integer
                        description: Number of vehicles with active subscriptions
                        example: 20
                      subscription:
                        type: object
                        nullable: true
                        description: Account subscription information
                        properties:
                          subscriptionid:
                            type: string
                            format: uuid
                            description: Subscription ID
                          packageid:
                            type: string
                            format: uuid
                            description: Package ID
                          status:
                            type: string
                            description: Subscription status
                        example:
                          subscriptionid: "12345678-1234-1234-1234-123456789012"
                          packageid: "12345678-1234-1234-1234-123456789012"
                          status: "active"
                      rootfleetid:
                        type: string
                        format: uuid
                        description: Root fleet ID for the account
                        example: "12345678-1234-1234-1234-123456789012"
                      overview:
                        type: object
                        description: Summary overview statistics
                        properties:
                          totalfleets:
                            type: integer
                            description: Total fleets count
                            example: 5
                          totalvehicles:
                            type: integer
                            description: Total vehicles count
                            example: 25
                          totalusers:
                            type: integer
                            description: Total users count
                            example: 10
                          subscribedvehicles:
                            type: integer
                            description: Subscribed vehicles count
                            example: 20
                          activesubscription:
                            type: boolean
                            description: Whether account has active subscription
                            example: true
                  msg:
                    type: string
                    example: "Account overview fetched successfully"
        "400":
          description: Bad Request - Invalid input data
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INPUT_ERROR"
                      errdata:
                        type: string
                        example: "Invalid Account ID format"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Invalid input data"
        "403":
          description: Forbidden - Account access denied
        "500":
          description: Internal Server Error - Get account overview failed

  /api/v1/fms/fleetinsights/vehicle/allinsights:
    post:
      tags:
        - FMS JS > FMS > FleetInsights
      summary: Get All Vehicle Insights
      description: Retrieve comprehensive insights (charging sessions, distance travelled, trips, energy consumed, charging deviations) for one or multiple vehicles within a specified time range
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vinnumbers
                - starttime
                - endtime
              properties:
                vinnumbers:
                  oneOf:
                    - type: string
                      minLength: 1
                      maxLength: 128
                      description: "Single VIN number"
                      example: "WBAFW31050F123456"
                    - type: array
                      items:
                        type: string
                        minLength: 1
                        maxLength: 128
                      minItems: 1
                      description: "Array of VIN numbers"
                      example:
                        [
                          "WBAFW31050F123456",
                          "WBAFW31050F123457",
                          "WBAFW31050F123458",
                        ]
                  description: "Single VIN number or array of VIN numbers for which to get insights"
                starttime:
                  type: integer
                  description: "Start time in milliseconds (timestamp). Must be less than endtime"
                  example: 1716150000000
                endtime:
                  type: integer
                  description: "End time in milliseconds (timestamp). Must be greater than starttime"
                  example: 1716236400000
                filter:
                  type: string
                  description: "Optional filter to specify which insights to retrieve"
                  enum:
                    [
                      "all",
                      "distancetravelled",
                      "chargingsessions",
                      "energyconsumed",
                      "trips",
                      "chargingdeviation",
                    ]
                  default: "all"
                  example: "all"
      responses:
        "200":
          description: "Vehicle insights retrieved successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: object
                    properties:
                      totalchargingsessions:
                        type: number
                        description: "Total number of charging sessions"
                        example: 45
                      totaldistancetravelled:
                        type: number
                        description: "Total distance travelled in km"
                        example: 1250.5
                      totaltrips:
                        type: number
                        description: "Total number of trips"
                        example: 89
                      totalenergyconsumed:
                        type: number
                        description: "Total energy consumed in kWh"
                        example: 425.8
                      totalchargingdeviation:
                        type: number
                        description: "Total charging deviations"
                        example: 3
                      treesaved:
                        type: number
                        description: "Trees saved equivalent"
                        example: 12.5
                      co2emissionssaved:
                        type: number
                        description: "CO2 emissions saved in kg"
                        example: 250.3
                      fuelcostsaved:
                        type: number
                        description: "Fuel cost saved in currency units"
                        example: 5000.75
                      distancetravelled:
                        type: object
                        description: "Distance travelled breakdown (only if filter is 'all' or 'distancetravelled')"
                        additionalProperties: true
                      chargingsessions:
                        type: object
                        description: "Charging sessions breakdown (only if filter is 'all' or 'chargingsessions')"
                        additionalProperties: true
                      trips:
                        type: object
                        description: "Trips breakdown (only if filter is 'all' or 'trips')"
                        additionalProperties: true
                      energyconsumed:
                        type: object
                        description: "Energy consumed breakdown (only if filter is 'all' or 'energyconsumed')"
                        additionalProperties: true
                      chargingdeviation:
                        type: object
                        description: "Charging deviation breakdown (only if filter is 'all' or 'chargingdeviation')"
                        additionalProperties: true
                  msg:
                    type: string
                    example: "SUCCESS"
        "400":
          description: "Bad Request - Invalid input parameters"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INPUT_ERROR", "INVALID_TIME_RANGE"]
                        example: "INPUT_ERROR"
                      errdata:
                        type: string
                        example: "starttime must be less than endtime"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Invalid input data"
        "403":
          description: "Forbidden - Account token authentication required"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "TOKEN_REQUIRED"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Account token is required"
        "500":
          description: "Internal Server Error - Failed to retrieve insights"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INTERNAL_ERROR"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Failed to get vehicle insights"

  /api/v1/fms/fleetinsights/fleet/{fleetid}/allinsights:
    get:
      tags:
        - FMS JS > FMS > FleetInsights
      summary: Get All Fleet Insights
      description: Retrieve comprehensive fleet insights including charging sessions, distance travelled, trips, energy consumed, and charging deviations for a specific fleet within a specified time range
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: fleetid
          required: true
          schema:
            type: string
            format: uuid
          example: "16d1bfc0-249f-41a9-b894-57f9630d8135"
          description: Fleet ID to get insights for
        - in: query
          name: starttime
          required: true
          schema:
            type: string
          example: "1716150000000"
          description: Start time in milliseconds (timestamp). Must be less than endtime
        - in: query
          name: endtime
          required: true
          schema:
            type: string
          example: "1716236400000"
          description: End time in milliseconds (timestamp). Must be greater than starttime
        - in: query
          name: recursive
          required: false
          schema:
            type: boolean
            default: false
          example: true
          description: Whether to include sub-fleets recursively
        - in: query
          name: filter
          required: false
          schema:
            type: string
            enum: ["all", "distancetravelled", "chargingsessions", "energyconsumed", "trips", "chargingdeviation"]
            default: "all"
          example: "all"
          description: Filter to specify which insights to include
      responses:
        "200":
          description: Fleet insights retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: object
                    properties:
                      totalchargingsessions:
                        type: integer
                        description: "Total number of charging sessions"
                        example: 45
                      totaldistancetravelled:
                        type: number
                        description: "Total distance travelled in kilometers"
                        example: 1250.5
                      totalenergyconsumed:
                        type: number
                        description: "Total energy consumed in kWh"
                        example: 345.8
                      totaltrips:
                        type: integer
                        description: "Total number of trips"
                        example: 123
                      totalchargingdeviation:
                        type: integer
                        description: "Total charging deviations"
                        example: 3
                      distancetravelled:
                        type: object
                        description: "Detailed distance travelled analytics by vehicle"
                        additionalProperties: true
                      chargingsessions:
                        type: object
                        description: "Detailed charging sessions analytics by vehicle"
                        additionalProperties: true
                      energyconsumed:
                        type: object
                        description: "Detailed energy consumption analytics by vehicle"
                        additionalProperties: true
                      trips:
                        type: object
                        description: "Detailed trips analytics by vehicle"
                        additionalProperties: true
                      chargingdeviation:
                        type: object
                        description: "Detailed charging deviation analytics by vehicle"
                        additionalProperties: true
                  msg:
                    type: string
                    example: "SUCCESS"
        "400":
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INVALID_TIME_RANGE"
                      errdata:
                        type: object
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "starttime must be less than endtime"
        "403":
          description: Forbidden - Insufficient permissions to access fleet insights
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INSUFFICIENT_PERMISSIONS"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "You don't have permission to get fleet insights."
        "500":
          description: Internal Server Error - Failed to retrieve fleet insights
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INTERNAL_ERROR"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Failed to get fleet insights"

  /api/v1/fms/fleetinsights/vehicle/ecocontribution:
    post:
      tags:
        - FMS JS > FMS > FleetInsights
      summary: Get Vehicle Eco Contribution
      description: Calculate eco contribution metrics (fuel cost saved, trees saved, CO2 emissions saved) for one or multiple vehicles
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vinnumbers
              properties:
                vinnumbers:
                  oneOf:
                    - type: string
                      minLength: 1
                      maxLength: 128
                      description: "Single VIN number"
                      example: "WBAFW31050F123456"
                    - type: array
                      items:
                        type: string
                        minLength: 1
                        maxLength: 128
                      minItems: 1
                      description: "Array of VIN numbers"
                      example:
                        [
                          "WBAFW31050F123456",
                          "WBAFW31050F123457",
                          "WBAFW31050F123458",
                        ]
                  description: "Single VIN number or array of VIN numbers for which to calculate eco contribution"
                vehiclematric:
                  type: boolean
                  default: false
                  description: "Whether to include detailed vehicle-wise metrics breakdown"
                  example: true
      responses:
        "200":
          description: Vehicle eco contribution calculated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    oneOf:
                      - type: object
                        description: "Simple cumulative response when vehiclematric=false"
                        properties:
                          fuelcostsaved:
                            type: string
                            description: "Total fuel cost saved in rupees"
                            example: "₹1,250.50"
                          treesaved:
                            type: string
                            description: "Total trees saved equivalent"
                            example: "15"
                          co2emissionssaved:
                            type: string
                            description: "Total CO2 emissions saved in tonnes"
                            example: "2.5 t"
                      - type: object
                        description: "Detailed response when vehiclematric=true"
                        properties:
                          cumulativecontribution:
                            type: object
                            properties:
                              fuelcostsaved:
                                type: string
                                description: "Total fuel cost saved in rupees"
                                example: "₹1,250.50"
                              treesaved:
                                type: string
                                description: "Total trees saved equivalent"
                                example: "15"
                              co2emissionssaved:
                                type: string
                                description: "Total CO2 emissions saved in tonnes"
                                example: "2.5 t"
                          vehiclecontribution:
                            type: array
                            items:
                              type: object
                              properties:
                                vin:
                                  type: string
                                  description: "Vehicle VIN number"
                                fuelsaved:
                                  type: string
                                  description: "Fuel cost saved for this vehicle"
                                treessaved:
                                  type: string
                                  description: "Trees saved equivalent for this vehicle"
                                co2saved:
                                  type: string
                                  description: "CO2 emissions saved for this vehicle"
                            description: "Individual vehicle contribution breakdown"
                  msg:
                    type: string
                    example: "SUCCESS"
        "400":
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INPUT_ERROR"
                      errdata:
                        type: object
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "VIN NO is required"
        "403":
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INSUFFICIENT_PERMISSIONS"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "You don't have permission to get fleet insights."
        "500":
          description: Internal Server Error - Failed to calculate eco contribution
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "FAILED_TO_GET_VEHICLE_ECO_CONTRIBUTION"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Failed to get vehicle eco contribution"

  /api/v1/fms/fleetinsights/fleet/{fleetid}/ecocontribution:
    get:
      tags:
        - FMS JS > FMS > FleetInsights
      summary: Get Fleet Eco Contribution
      description: Calculate eco contribution metrics (fuel cost saved, trees saved, CO2 emissions saved) for all vehicles in a fleet
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: fleetid
          required: true
          schema:
            type: string
            format: uuid
          example: "16d1bfc0-249f-41a9-b894-57f9630d8135"
          description: Fleet ID to calculate eco contribution for
        - in: query
          name: vehiclematric
          required: false
          schema:
            type: boolean
            default: false
          example: true
          description: Whether to include detailed vehicle-wise metrics breakdown
        - in: query
          name: recursive
          required: false
          schema:
            type: boolean
            default: false
          example: true
          description: Whether to include sub-fleets recursively
      responses:
        "200":
          description: Fleet eco contribution calculated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: object
                    properties:
                      cumulativecontribution:
                        type: object
                        properties:
                          fuelcostsaved:
                            type: string
                            description: "Total fuel cost saved in rupees"
                            example: "₹5,250.75"
                          treesaved:
                            type: string
                            description: "Total trees saved equivalent"
                            example: "65"
                          co2emissionssaved:
                            type: string
                            description: "Total CO2 emissions saved in tonnes"
                            example: "12.3 t"
                      vehiclecontribution:
                        type: array
                        items:
                          type: object
                          properties:
                            vin:
                              type: string
                              description: "Vehicle VIN number"
                            fuelsaved:
                              type: string
                              description: "Fuel cost saved for this vehicle"
                            treessaved:
                              type: string
                              description: "Trees saved equivalent for this vehicle"
                            co2saved:
                              type: string
                              description: "CO2 emissions saved for this vehicle"
                        description: "Individual vehicle contribution breakdown (only included when vehiclematric=true)"
                  msg:
                    type: string
                    example: "SUCCESS"
        "400":
          description: Bad Request - Invalid fleet ID or parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "FLEET_NOT_FOUND"
                      errdata:
                        type: object
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Fleet not found or does not belong to this account"
        "403":
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INSUFFICIENT_PERMISSIONS"
                  data:
                    type: "null"
                  msg:
