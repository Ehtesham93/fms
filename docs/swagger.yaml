  /api/v1/fms/account/subscription/subscribe:
    post:
      tags:
        - FMS JS > FMS > AccountMangement > Subscription
      summary: Subscribe Vehicle
      description: Subscribe one or more vehicles to the account's subscription
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vinnos
              properties:
                vinnos:
                  oneOf:
                    - type: array
                      items:
                        type: string
                        minLength: 1
                        maxLength: 128
                      minItems: 1
                      description: "Array of VIN numbers to subscribe"
                      example: ["WBAFW31050F123456", "WBAFW31050F123457"]
                  description: "Single VIN number or array of VIN numbers to subscribe"
      responses:
        "200":
          description: Vehicle(s) subscribed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: object
                    properties:
                      subscribedvehicles:
                        type: array
                        items:
                          type: string
                        description: "List of successfully subscribed VIN numbers"
                      failedvehicles:
                        type: array
                        items:
                          type: object
                          properties:
                            vinno:
                              type: string
                            reason:
                              type: string
                        description: "List of vehicles that failed to subscribe with reasons"
                  msg:
                    type: string
                    example: "Vehicle subscription completed"
        "400":
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum:
                          [
                            "INPUT_ERROR",
                            "INVALID_VIN",
                            "VEHICLE_ALREADY_SUBSCRIBED",
                          ]
                        example: "INPUT_ERROR"
                      errdata:
                        type: string
                        example: "VIN number is required"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Invalid input data"
        "403":
          description: Forbidden - Account token authentication required
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "TOKEN_REQUIRED"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Account token is required"
        "500":
          description: Internal Server Error - Failed to subscribe vehicle
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "SUBSCRIBE_VEHICLE_ERR"
                      errdata:
                        type: string
                        example: "Internal server error details"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Failed to subscribe vehicle"
