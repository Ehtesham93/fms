          description: Forbidden - Insufficient permissions (requires consolemgmt.vehicle.admin or consolemgmt.vehicle.view)
        "500":
          description: Internal Server Error - Failed to get vehicle account details
  /api/v1/platform/vehicle/{vinno}/getcangpsdata:
    post:
      tags:
        - Platform > Vehicle Management
      summary: Get Vehicle CAN and GPS Data
      description: Retrieve merged CAN (Controller Area Network) and GPS historical data for a specific vehicle within a time range. Returns merged telemetry data combining CAN parameters and GPS location information. Requires console vehicle management permissions. Maximum time range is 31 days.
      parameters:
        - in: path
          name: vinno
          required: true
          schema:
            type: string
            maxLength: 128
          description: Vehicle VIN number (alphanumeric with spaces, max 128 chars)
          example: "ABC123XYZ456"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - starttime
                - endtime
              properties:
                starttime:
                  type: integer
                  format: int64
                  description: Start time as Unix timestamp in milliseconds
                  example: 1640995200000
                  minimum: 0
                  maximum: 4102444800000
                endtime:
                  type: integer
                  format: int64
                  description: End time as Unix timestamp in milliseconds (must be greater than starttime, max 31 days range)
                  example: 1641081600000
                  minimum: 0
                  maximum: 4102444800000
                canparams:
                  type: array
                  items:
                    type: string
                    minLength: 1
                    maxLength: 128
                  minItems: 1
                  description: Array of CAN parameter names to retrieve (optional, at least one required if provided)
                  example: ["speed", "rpm", "odometer", "fuel_level"]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Vehicle CAN+GPS data fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    vin:
                      type: string
                      description: Vehicle VIN number
                      example: "ABC123XYZ456"
                    utctime:
                      type: integer
                      format: int64
                      description: UTC timestamp in milliseconds
                      example: 1640995260000
                    modelcode:
                      type: string
                      description: Vehicle model code
                      example: "MODEL123"
                    latitude:
                      type: number
                      format: double
                      description: GPS latitude coordinate
                      example: 28.6139
                    longitude:
                      type: number
                      format: double
                      description: GPS longitude coordinate
                      example: 77.2090
                    speed:
                      type: number
                      description: Vehicle speed (if requested in canparams)
                      example: 45.5
                    rpm:
                      type: number
                      description: Engine RPM (if requested in canparams)
                      example: 2500
                    odometer:
                      type: number
                      description: Vehicle odometer reading (if requested in canparams)
                      example: 15000.5
                    fuel_level:
                      type: number
                      description: Fuel level percentage (if requested in canparams)
                      example: 75.2
                  additionalProperties: true
                description: Array of merged CAN and GPS data records sorted by timestamp
        "400":
          description: Bad Request - Invalid parameters, time range, or CAN parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INPUT_ERROR", "INVALID_TIME_RANGE"]
                        example: "INVALID_TIME_RANGE"
                      errdata:
                        type: object
                        description: Additional error details
                  msg:
                    type: string
                    enum:
                      - "starttime must be less than endtime"
                      - "VIN must be a valid format"
                      - "Start Time must be a number"
                      - "End Time must be a number"
                      - "At least one CAN param is required"
                      - "Each CAN param must be a string"
                      - "CAN param cannot be empty"
                      - "CAN param must be at most 128 characters long"
                    example: "starttime must be less than endtime"
        "403":
          description: Forbidden - Insufficient permissions (requires consolemgmt.vehicle.admin or consolemgmt.vehicle.view)
        "500":
          description: Internal Server Error - Failed to get vehicle CAN+GPS data
  /api/v1/platform/vehicle/reviewvehicleonboard:
    post:
      tags:
        - Platform > Vehicle Management
      summary: Review Vehicle Onboarding
      description: Review and approve vehicle onboarding by updating pending vehicle data and moving it to done status. This API processes vehicles that are in pending review status, merges updated fields with original data, and completes the onboarding process. Requires console vehicle admin permissions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - updatedfields
              properties:
                updatedfields:
                  type: object
                  required:
                    - vin
                    - vehicleModel
                    - vehicleVariant
                  properties:
                    vin:
                      type: string
                      description: Vehicle VIN number
                      example: "MA1LD1234567890123"
                    vehicleModel:
                      type: string
                      description: Vehicle model name
                      example: "Thar"
                    vehicleVariant:
                      type: string
                      description: Vehicle variant/trim level
                      example: "LX 4WD"
                    tgu_imei_no:
                      type: string
                      nullable: true
                      description: TGU IMEI number (optional)
                      example: "123456789012345"
                    mobileNo:
                      type: string
                      nullable: true
                      description: Mobile number associated with vehicle (optional)
                      example: "9876543210"
                    dealer:
                      type: string
                      description: Dealer name (optional)
                      example: "ABC Motors"
                    deliveredDate:
                      type: string
                      nullable: true
                      description: Vehicle delivery date in DD/MM/YY format (optional)
                    engineNo:
                      type: string
                      nullable: true
                      description: Engine number (optional)
                      example: "ENG123456789"
                    fuelType:
                      type: string
                      description: Fuel type (optional)
                      example: "Diesel"
                    licensePlate:
                      type: string
                      nullable: true
                      description: License plate number (optional)
                      example: "MH12AB1234"
                    retailsSaleDate:
                      type: string
                      nullable: true
                      description: Retail sale date in DD/MM/YY format (optional)
                    vehicleCity:
                      type: string
                      nullable: true
                      description: Vehicle city/location (optional)
                      example: "Mumbai"
                    vehicleColour:
                      type: string
                      nullable: true
                      description: Vehicle color (optional)
                      example: "Red"
                  additionalProperties: false
                  description: Updated vehicle fields to be reviewed and merged with original data. At least one field must be provided. Only changes from original data will be applied.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Vehicle reviewed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Success message
                    example: "Vehicle reviewed successfully"
                description: Successful vehicle review completion
        "400":
          description: Bad Request - Invalid input data or vehicle already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INPUT_ERROR", "VEHICLE_ALREADY_EXISTS"]
                        example: "INPUT_ERROR"
                      errdata:
                        type: object
                        description: Additional error details
                  msg:
                    type: string
                    enum:
                      - "Invalid User ID format"
                      - "At least one field must be provided in updatedfields"
                      - "Vehicle already exists"
                    example: "At least one field must be provided in updatedfields"
        "403":
          description: Forbidden - Insufficient permissions (requires consolemgmt.vehicle.admin)
        "500":
          description: Internal Server Error - Failed to review vehicle onboarding
