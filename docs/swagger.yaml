  /api/v1/platform/vehicle/vehicleserviceonboarding:
    post:
      tags:
        - Platform > Vehicle Management
      summary: Vehicle Service Onboarding
      description: Onboard a vehicle with an external service using VIN and mobile number. This endpoint facilitates the integration with third-party services for vehicle registration by making HTTP requests to external service endpoints. Requires console vehicle admin permissions. The VIN must be a valid 17-character Indian VIN starting with MA or MB.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vin
                - mobileno
              properties:
                vin:
                  type: string
                  minLength: 17
                  maxLength: 17
                  description: Vehicle Identification Number (exactly 17 characters, must start with MA or MB for Indian vehicles)
                  example: "MA1AD2ZA7PJF25186"
                mobileno:
                  type: string
                  description: Mobile number (exactly 10 digits starting with 6-9)
                  example: "9876543210"
      responses:
        "200":
          description: Vehicle service onboarding completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Response data from the external service
                    additionalProperties: true
                    example: {"status": "success", "vehicleId": "VH123456"}
                  msg:
                    type: string
                    description: Success message from the external service
                    example: "Vehicle service onboarding completed successfully"
                description: Standard API response format with data from external service
        "400":
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INPUT_ERROR"]
                        example: "INPUT_ERROR"
                      errdata:
                        type: object
                        description: Validation error details
                  msg:
                    type: string
                    enum:
                      - "Invalid User ID format"
                      - "Invalid VIN format"
                      - "VIN cannot be empty"
                      - "VIN must be exactly 17 characters"
                      - "Please enter a valid Indian VIN number starting with MA or MB"
                      - "Invalid Mobile Number format"
                      - "Mobile number must be exactly 10 digits and start with 6 to 9"
                    example: "Please enter a valid Indian VIN number starting with MA or MB"
        "403":
          description: Forbidden - Insufficient permissions (requires consolemgmt.vehicle.admin)
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INSUFFICIENT_PERMISSIONS"]
                        example: "INSUFFICIENT_PERMISSIONS"
                  msg:
                    type: string
                    example: "You don't have permission to onboard vehicle service."
        "500":
          description: Internal Server Error - Vehicle service onboarding failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["VEHICLE_SERVICE_ONBOARDING_ERR"]
                        example: "VEHICLE_SERVICE_ONBOARDING_ERR"
                      errdata:
                        type: string
                        description: Error details from the external service or system
                  msg:
                    type: string
                    example: "Vehicle service onboarding failed"

