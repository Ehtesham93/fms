  /api/v1/fms/account/subscription/intent:
    post:
      tags:
        - FMS JS > FMS > AccountMangement > Subscription
      summary: Create Subscription Intent
      description: Create a payment intent for subscription billing or upgrades
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vinnos
              properties:
                vinnos:
                  type: array
                  items:
                    type: string
                    minLength: 1
                    maxLength: 128
                  minItems: 1
                  description: "Array of VIN numbers for subscription intent"
                  example: ["WBAFW31050F123456", "WBAFW31050F123457"]
      responses:
        "200":
          description: Subscription payment intent created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: object
                    properties:
                      intentid:
                        type: string
                        description: "Unique identifier for the payment intent"
                        example: "pi_1234567890abcdef"
                      clientsecret:
                        type: string
                        description: "Client secret for completing the payment on frontend"
                        example: "pi_1234567890abcdef_secret_xyz"
                      amount:
                        type: number
                        description: "Amount to be charged"
                        example: 99.99
                      currency:
                        type: string
                        description: "Currency code"
                        example: "USD"
                      status:
                        type: string
                        enum:
                          [
                            "requires_payment_method",
                            "requires_confirmation",
                            "processing",
                            "succeeded",
                            "canceled",
                          ]
                        description: "Current status of the payment intent"
                        example: "requires_payment_method"
                      createdat:
                        type: string
                        format: date-time
                        description: "Timestamp when the intent was created"
                  msg:
                    type: string
                    example: "Subscription payment intent created successfully"
        "400":
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum:
                          [
                            "INPUT_ERROR",
                            "INVALID_AMOUNT",
                            "INVALID_CURRENCY",
                            "SUBSCRIPTION_NOT_FOUND",
                          ]
                        example: "INPUT_ERROR"
                      errdata:
                        type: string
                        example: "Amount must be greater than 0"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Invalid input data"
        "403":
          description: Forbidden - Account token authentication required
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "TOKEN_REQUIRED"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Account token is required"
        "500":
          description: Internal Server Error - Failed to create payment intent
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "CREATE_INTENT_ERR"
                      errdata:
                        type: string
                        example: "Internal server error details"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Failed to create subscription payment intent"
