        "200":
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - FMS JS > Platform > Users
      summary: Delete User
      description: Permanently delete a user from the platform (requires super admin permissions)
      parameters:
        - in: path
          name: userid
          required: true
          schema:
            type: string
            format: uuid
          example: "6f66b236-e11b-47b8-b150-1fd201b6f7c4"
          description: UUID of the user to delete
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: object
                    properties:
                      userid:
                        type: string
                        format: uuid
                        description: "ID of the deleted user"
                      deletedby:
                        type: string
                        format: uuid
                        description: "ID of the user who performed the deletion"
                      deletedat:
                        type: string
                        format: date-time
                        description: "Timestamp when user was deleted"
                  msg:
                    type: string
                    example: "User deleted successfully"
        "400":
          description: Bad Request - Invalid user ID or business logic error
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INPUT_ERROR", "CANNOT_DELETE_SELF", "USER_NOT_FOUND", "USER_ALREADY_DELETED", "CANNOT_DELETE_SEED_USER"]
                        example: "CANNOT_DELETE_SELF"
                      errdata:
                        type: object
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "You cannot delete yourself"
        "403":
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INSUFFICIENT_PERMISSIONS"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "You don't have permission to delete user."
        "500":
          description: Internal Server Error - Failed to delete user
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "DELETE_USER_ERR"
                      errdata:
                        type: string
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Delete user failed"
