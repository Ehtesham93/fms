  /api/v1/platform/vehicle/{vinno}/delete:
    delete:
      tags:
        - Platform > Vehicle Management
      summary: Delete Vehicle
      description: Delete a vehicle from the system after performing comprehensive safety checks. The vehicle cannot be deleted if it has active associations with fleets, accounts, subscriptions, geofence rules, or historical data. Requires console vehicle management permissions.
      parameters:
        - in: path
          name: vinno
          required: true
          schema:
            type: string
            maxLength: 128
          description: Vehicle VIN number (alphanumeric with spaces, max 128 chars)
          example: "ABC123XYZ456"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Vehicle deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  vinno:
                    type: string
                    description: VIN number of the deleted vehicle
                    example: "ABC123XYZ456"
                  isdeleted:
                    type: boolean
                    description: Confirmation that the vehicle has been deleted
                    example: true
                  msg:
                    type: string
                    example: "Vehicle deleted successfully"
        "400":
          description: Bad Request - Vehicle not found, has associations, or has historical data
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INPUT_ERROR", "VEHICLE_NOT_FOUND", "VEHICLE_ASSOCIATED", "VEHICLE_HAS_HISTORICAL_DATA"]
                        example: "VEHICLE_ASSOCIATED"
                      errdata:
                        type: string
                        description: Additional error details
                  msg:
                    type: string
                    example: "Vehicle is associated with fleets: Account: acc123, Fleet: fleet456"
        "403":
          description: Forbidden - Insufficient permissions (requires consolemgmt.vehicle.admin)
        "500":
          description: Internal Server Error - Failed to delete vehicle
  /api/v1/platform/vehicle/{vinno}/accountinfo:
    get:
      tags:
        - Platform > Vehicle Management
      summary: Get Vehicle Account Details
      description: Retrieve detailed account and fleet information for a specific vehicle. Shows which accounts and fleets the vehicle is associated with, including ownership status and assignment details. Requires console vehicle management permissions.
      parameters:
        - in: path
          name: vinno
          required: true
          schema:
            type: string
            maxLength: 128
          description: Vehicle VIN number (alphanumeric with spaces, max 128 chars)
          example: "ABC123XYZ456"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Vehicle account details fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    accountid:
                      type: string
                      format: uuid
                      description: Account ID that the vehicle is associated with
                      example: "16d1bfc0-249f-41a9-b894-57f9630d8135"
                    accountname:
                      type: string
                      description: Name of the account
                      example: "Acme Corporation"
                    fleetid:
                      type: string
                      format: uuid
                      description: Fleet ID within the account
                      example: "22e2cfc1-359g-42b0-c905-68g9640e9246"
                    fleetname:
                      type: string
                      description: Name of the fleet
                      example: "Delivery Fleet"
                    isowner:
                      type: boolean
                      description: Whether the account is the owner of the vehicle
                      example: true
