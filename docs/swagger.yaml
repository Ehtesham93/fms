  /api/v1/fms/public/user/resetpassword:
    post:
      tags:
        - FMS JS > User
      summary: Reset Password
      description: |
        Reset user password using a reset token with reCAPTCHA verification.

        **For reCAPTCHA testing, visit: {PORT}/api/v1/api-docs/captcha.html**

        This endpoint requires:
        - Valid reset ID/token
        - New password (8-128 characters)
        - reCAPTCHA token for security verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resetid
                - newpassword
                - g-recaptcha-response
              properties:
                resetid:
                  type: string
                  description: "Password reset token/ID received via email"
                  example: "reset_token_123"
                newpassword:
                  type: string
                  minLength: 8
                  maxLength: 128
                  description: "New password (8-128 characters)"
                  example: "NewSecurePassword@123"
                g-recaptcha-response:
                  type: string
                  description: "reCAPTCHA token from Google reCAPTCHA verification. Get this from {PORT}/docs/captcha.html"
                  example: "03AFcWeA7Bx..."
      security:
        - noauthAuth: []
      responses:
        "200":
          description: "Password reset successful"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: "Reset success data"
                  msg:
                    type: string
                    example: "Password reset successful"
        "400":
          description: "Bad Request - Invalid input or missing reCAPTCHA"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum:
