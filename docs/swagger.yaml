      summary: Get Fleet Info
      description: Get detailed information about a specific fleet
      parameters:
        - in: path
          name: fleetid
          required: true
          schema:
            type: string
            format: uuid
          description: Fleet ID (UUID format)
          example: "16d1bfc0-249f-41a9-b894-57f9630d8135"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Fleet information
                  msg:
                    type: string
                    example: "Fleet info fetched successfully"
        "400":
          description: Bad Request - Invalid fleet ID or fleet not found
        "403":
          description: Forbidden - Insufficient permissions
        "500":
          description: Internal Server Error
    put:
      tags:
        - FMS JS > FMS > AccountMangement > Fleet
      summary: Edit Fleet
      parameters:
        - in: path
          name: fleetid
          required: true
          schema:
            type: string
            format: uuid
          description: Unique identifier for the fleet
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fleetname:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: Fleet name (1-128 characters, alphanumeric with spaces, hyphens, underscores)
                fleetinfo:
                  type: object
                  description: Optional fleet information object
              required:
                - fleetname
              example:
                fleetname: "L1 fleet b"
                fleetinfo: {"location": "Building A"}
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - FMS JS > FMS > AccountMangement > Fleet
      summary: Delete Fleet
      description: Delete a fleet from the account. This operation will permanently remove the fleet and may affect associated vehicles and users.
      parameters:
        - in: path
          name: fleetid
          required: true
          schema:
            type: string
            format: uuid
          description: Unique identifier for the fleet to delete
          example: "16d1bfc0-249f-41a9-b894-57f9630d8135"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Fleet deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: object
                    properties:
                      fleetid:
                        type: string
                        format: uuid
                        description: ID of the deleted fleet
                      fleetname:
                        type: string
                        description: Name of the deleted fleet
                      deletedat:
                        type: string
                        format: date-time
                        description: Timestamp when the fleet was deleted
                      deletedby:
                        type: string
                        format: uuid
                        description: ID of the user who deleted the fleet
                  msg:
                    type: string
                    example: "Fleet deleted successfully"
        "400":
          description: Bad Request - Invalid input parameters or fleet cannot be deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum:
                          [
                            "INPUT_ERROR",
                            "FLEET_NOT_FOUND",
                            "FLEET_HAS_VEHICLES",
                            "FLEET_HAS_SUBFLEETS",
                            "FLEET_HAS_USERS",
                          ]
                        example: "FLEET_HAS_VEHICLES"
                      errdata:
                        type: string
                        example: "Cannot delete fleet that contains vehicles"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Fleet cannot be deleted"
        "403":
          description: Forbidden - Insufficient permissions to delete fleet
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INSUFFICIENT_PERMISSIONS"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Insufficient permissions to delete fleet"
        "404":
          description: Not Found - Fleet not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "FLEET_NOT_FOUND"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Fleet not found"
        "500":
          description: Internal Server Error - Failed to delete fleet
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "DELETE_FLEET_ERR"
                      errdata:
                        type: string
                        example: "Internal server error details"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Failed to delete fleet"
