                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Banner ID
                          example: 1
                        url:
                          type: string
                          description: Banner image URL or content URL
                          example: "https://example.com/banner.jpg"
                        priority:
                          type: integer
                          description: Display priority (lower numbers = higher priority)
                          example: 1
                        isenabled:
                          type: boolean
                          description: Whether the banner is enabled
                          example: true
                        createdat:
                          type: string
                          format: date-time
                          description: Banner creation timestamp
                        updatedat:
                          type: string
                          format: date-time
                          description: Banner last update timestamp
                    description: List of enabled banners ordered by priority
                  count:
                    type: integer
                    description: Total number of banners returned
                    example: 3
                  msg:
                    type: string
                    example: "Banners fetched successfully"
        "500":
          description: Internal Server Error - Failed to fetch banners
  /api/v1/platform/account/listpending:
