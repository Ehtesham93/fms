  /api/v1/fms/public/email/signin:
    post:
      tags:
        - FMS JS > User
      summary: SignIn
      description: |
        User authentication using email and password with reCAPTCHA verification.

        **For reCAPTCHA testing, visit: {PORT}/api/v1/api-docs/captcha.html**

        This endpoint requires:
        - Valid email address
        - Password (8-128 characters)
        - reCAPTCHA token for security verification

        Hash your password here -> https://academo.org/demos/SHA-256-hash-generator/
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - g-recaptcha-response
              properties:
                email:
                  type: string
                  format: email
                  description: "Valid email address"
                  example: "onboarding@nemo3.com"
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  description: "Password (8-128 characters)"
                  example: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
                g-recaptcha-response:
                  type: string
                  description: "reCAPTCHA token from Google reCAPTCHA verification. Get this from {PORT}/docs/captcha.html"
                  example: "03AFcWeA7Bx..."

      responses:
        "200":
          description: "Sign in successful"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      userid:
                        type: string
                        format: uuid
                        description: "User ID"
                      userinfo:
                        type: object
                        description: "User information"
                      token:
                        type: string
                        description: "JWT authentication token"
                      refreshtoken:
                        type: string
                        description: "Refresh token"
                  msg:
                    type: string
                    example: "Successfully signed in with your email"
        "400":
          description: "Bad Request - Invalid input or missing reCAPTCHA"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum:
                          ["INPUT_ERROR", "CAPTCHA_MISSING", "CAPTCHA_FAILED"]
                        example: "CAPTCHA_MISSING"
                      errdata:
                        type: string
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Please complete the security verification to continue."
        "401":
          description: "Unauthorized - Invalid credentials"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INVALID_CREDENTIALS"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "We couldn't sign you in. Please check your email and password."
        "500":
          description: "Internal Server Error"
  /api/v1/fms/public/invite/signup:
    post:
      tags:
        - FMS JS > User
      summary: Signup with Invite
      description: |
        Sign up with an invite and create a new user account with reCAPTCHA verification.

        **For reCAPTCHA testing, visit: {PORT}/api/v1/api-docs/captcha.html**

        This endpoint requires:
        - Valid invite ID
        - Password (8-128 characters)
        - Display name
        - reCAPTCHA token for security verification
      security:
        - noauthAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - inviteid
                - password
                - displayname
                - g-recaptcha-response
              properties:
                inviteid:
                  type: string
                  format: uuid
                  description: "Invite ID to validate and use for signup"
                  example: "cb7d9f7c-b928-4381-88f3-6c4c62afb212"
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  description: "Password for the new user account (8-128 characters)"
                  example: "Intellicar@123"
                displayname:
                  type: string
                  minLength: 1
                  maxLength: 128
                  pattern: "^[A-Za-z0-9 _-]+$"
                  description: "Display name for the user (letters, numbers, spaces, hyphens, underscores only)"
                  example: "Teja Surya"
                g-recaptcha-response:
                  type: string
                  description: "reCAPTCHA token from Google reCAPTCHA verification. Get this from {PORT}/docs/captcha.html"
                  example: "03AFcWeA7Bx..."
      responses:
        "200":
          description: "Signup successful - User account created and authenticated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: object
                    properties:
                      userid:
                        type: string
                        format: uuid
                        description: "Created user ID"
                      accountid:
                        type: string
                        format: uuid
                        description: "Account ID the user was added to"
                      fleetid:
                        type: string
                        format: uuid
                        description: "Fleet ID the user was added to"
                      usertoken:
                        type: string
                        description: "Authentication token for the user"
