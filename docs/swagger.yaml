                        "2hr_to_4hr":
                          type: number
                          example: 1
                        "4hr_to_8hr":
                          type: number
                          example: 0
                        "8hr_plus":
                          type: number
                          example: 0
                msg:
                  type: string
                  example: "Charge distribution retrieved successfully"
        "400":
