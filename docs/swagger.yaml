  /api/v1/platform/model/param:
    post:
      tags:
        - FMS JS > Platform > Model > Param
      summary: Create Model Parameter
      description: Create a new model parameter with optional parameter family association
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paramfamilycode:
                  type: string
                  maxLength: 128
                  description: Parameter family code (optional, max 128 chars)
                  example: "engine_params"
                paramcode:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: Parameter code (required, max 128 chars)
                  example: "soc"
                paramname:
                  type: string
                  minLength: 1
                  maxLength: 128
                  pattern: "^[A-Za-z0-9 _-]+$"
                  description: Parameter name (required, alphanumeric with spaces, hyphens, underscores)
                  example: "State of Charge"
                paraminfo:
                  type: object
                  description: Additional parameter information (optional)
                  default: {}
                  example:
                    unit: "percentage"
                    range: "0-100"
              required:
                - paramcode
                - paramname
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Model parameter created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      paramfamilycode:
                        type: string
                      paramcode:
                        type: string
                      paramname:
                        type: string
                      paraminfo:
                        type: object
                      isenabled:
                        type: boolean
                      createdby:
                        type: string
                        format: uuid
        "400":
          description: Bad Request - Invalid input data
        "403":
          description: Forbidden - Insufficient permissions
