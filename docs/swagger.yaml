  /api/v1/fms/account/user/{userid}/remove:
    delete:
      tags:
        - FMS JS > FMS > AccountMangement > Fleet > User
      summary: Remove User from Account
      description: Remove a user from the current account context. The user will lose all access to this account's resources and fleets.
      parameters:
        - in: path
          name: userid
          required: true
          schema:
            type: string
            format: uuid
          example: "6f66b236-e11b-47b8-b150-1fd201b6f7c4"
          description: UUID of the user to remove from account
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User removed from account successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: object
                    properties:
                      userid:
                        type: string
                        format: uuid
                        description: "ID of the removed user"
                      accountid:
                        type: string
                        format: uuid
                        description: "ID of the account user was removed from"
                      removedby:
                        type: string
                        format: uuid
                        description: "ID of the user who performed the removal"
                      removedat:
                        type: string
                        format: date-time
                        description: "Timestamp when user was removed"
                      message:
                        type: string
                        example: "User removed from account successfully"
                  msg:
                    type: string
                    example: "User removed from account successfully"
        "400":
          description: Bad Request - Invalid user ID or business logic error
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INPUT_ERROR", "CANNOT_REMOVE_SELF", "USER_NOT_FOUND", "USER_NOT_IN_ACCOUNT", "CANNOT_REMOVE_SEED_USER"]
                        example: "CANNOT_REMOVE_SELF"
                      errdata:
                        type: object
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "You cannot remove yourself from the account"
        "403":
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INSUFFICIENT_PERMISSIONS"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "You don't have permission to remove user."
        "500":
          description: Internal Server Error - Failed to remove user from account
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "FAILED_TO_REMOVE_USER_FROM_ACCOUNT"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Failed to remove user from account"

