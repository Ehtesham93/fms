          example: 1704153600000
        - in: query
          name: recursive
          required: false
          schema:
            type: boolean
            default: false
          description: Whether to include vehicles from subfleets recursively
          example: true
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Account fleet credits history fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        vinno:
                          type: string
                          description: Vehicle VIN number
                        targetdate:
                          type: string
                          description: Date of the credit transaction
                        creditsconsumed:
                          type: number
                          description: Credits consumed by this vehicle on this date
                        vehicleinfo:
                          type: object
                          description: Vehicle information details
                    description: Fleet-specific credits history entries for all vehicles
                  msg:
                    type: string
                    example: "Account fleet credits history fetched successfully"
        "400":
          description: Bad Request - Invalid fleet ID, time parameters, time range too long (>95 days), or fleet not found
        "403":
          description: Forbidden - Insufficient permissions to get account fleet credits history
        "500":
          description: Internal Server Error
  /api/v1/fms/account/fleet/{fleetid}/getmyperms:
    get:
      tags:
        - FMS JS > FMS > AccountMangement > Permissions
      summary: Get My Fleet Permissions
      description: Get the current user's permissions for a specific fleet. Returns both a flat list of permissions and permissions grouped by module. User must have valid access to the fleet.
      parameters:
        - in: path
          name: fleetid
          required: true
          schema:
            type: string
            format: uuid
          description: Fleet ID (UUID format)
          example: "16d1bfc0-249f-41a9-b894-57f9630d8135"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Fleet permissions retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Flat list of all permissions the user has for this fleet
                    example: ["fleet.vehicles.view", "fleet.vehicles.admin", "account.settings.view"]
                  permissionsbymodule:
                    type: array
                    items:
                      type: object
                      properties:
                        moduleid:
                          type: string
                          description: Module identifier
                        modulename:
                          type: string
                          description: Module display name
                        perms:
                          type: array
                          items:
                            type: string
                          description: List of permissions for this module
                    description: Permissions organized by module for UI display
                    example: [
                      {
                        "moduleid": "fleet",
                        "modulename": "Fleet Management",
                        "perms": ["fleet.vehicles.view", "fleet.vehicles.admin"]
                      }
                    ]
                  msg:
                    type: string
                    example: "Fleet permissions retrieved successfully"
        "400":
          description: Bad Request - Invalid fleet ID format, fleet not found, or user not in fleet
        "500":
          description: Internal Server Error
  /api/v1/fms/account/assignmenthistory:
    get:
      tags:
        - FMS JS > FMS > AccountMangement > Vehicle Assignment
      summary: Get Account Assignment History
      description: Get the vehicle assignment history for the account within a specified time range. Shows vehicles assigned to and removed from the account's fleets. Maximum time range is 100 days. User must be authenticated.
      parameters:
        - in: query
          name: starttime
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1000000000000
            maximum: 9999999999999
          description: Start time as timestamp in milliseconds
          example: 1704067200000
        - in: query
          name: endtime
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1000000000000
            maximum: 9999999999999
          description: End time as timestamp in milliseconds (must be greater than start time)
          example: 1704153600000
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Account assignment history fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    vinno:
                      type: string
                      description: Vehicle VIN number
                    regno:
                      type: string
                      description: Vehicle registration number or license plate (fallback to VIN if empty)
                    vehiclemodel:
                      type: string
                      description: Vehicle model information
                    isowner:
                      type: boolean
                      description: Whether the account is the owner of the vehicle
                    accvininfo:
                      type: object
                      description: Account-specific vehicle information
                    assignedat:
                      type: string
                      format: date-time
                      description: When the vehicle was initially assigned
                    assignedby:
                      type: string
                      description: Display name of user who assigned the vehicle
                    updatedat:
                      type: string
                      format: date-time
                      description: When this history entry was created
                    updatedby:
                      type: string
                      description: Display name of user who performed this action
                    action:
                      type: string
                      description: Type of action performed (assign/remove/etc.)
                description: List of vehicle assignment history entries for the account
        "400":
          description: Bad Request - Invalid time parameters, start time >= end time, or time range too long (>100 days)
        "500":
          description: Internal Server Error
  /api/v1/fms/public/user/session:
    delete:
      tags:
        - FMS JS > FMS > Authentication
      summary: Delete User Session (Sign Out)
      description: Sign out the current user by clearing their authentication cookie. This effectively logs the user out of the system.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: You have been signed out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "You have been signed out successfully"
        "500":
          description: Internal Server Error
  /api/v1/fms/public/user/password/change:
    post:
      tags:
        - FMS JS > FMS > Authentication
      summary: Change User Password
      description: Change the user's password after validating the current password and security verification (reCAPTCHA). For Captcha visit {BASE_URL}/api/v1/api-docs/captcha.html
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - oldpassword
                - newpassword
                - g-recaptcha-response
              properties:
                email:
                  type: string
                  format: email
                  description: User's email address
                  
                oldpassword:
                  type: string
                  description: Current password for verification
                  
                newpassword:
                  type: string
                  description: New password to set
                  example: "newPassword456"
                g-recaptcha-response:
                  type: string
                  description: Google reCAPTCHA response token for security verification
                  example: "03AGdBq25..."
      responses:
        "200":
          description: Your password has been changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password has been changed successfully"
                  userid:
                    type: string
                    description: User ID whose password was changed
                  msg:
                    type: string
                    example: "Your password has been changed successfully"
        "400":
          description: Bad Request - Invalid input, captcha missing/failed, same password, or invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["CAPTCHA_MISSING", "CAPTCHA_FAILED", "INPUT_ERROR", "PASSWORD_SAME_AS_OLD", "INVALID_CREDENTIALS", "ACCOUNT_DISABLED", "ACCOUNT_DELETED", "USER_NOT_FOUND"]
                        example: "INVALID_CREDENTIALS"
                  msg:
                    type: string
                    example: "Please complete the security verification to continue."
        "500":
          description: Internal Server Error - Failed to change password
  /api/v1/fms/user/refreshtoken:
    post:
      tags:
        - FMS JS > FMS > Authentication
      summary: Refresh User Token
      description: Refresh the user's authentication token using both the main token and refresh token from cookies. Returns new authentication tokens and updates the user's session cookie.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  userid:
                    type: string
                    description: User ID from the refreshed token
                    example: "3e086a85-e93a-4ed8-bee0-b33e6e8718ce"
                  token:
                    type: string
                    description: New authentication token
                  refreshtoken:
                    type: string
                    description: New refresh token
                  msg:
                    type: string
                    example: "Token refreshed successfully"
                description: New authentication tokens
        "400":
          description: Bad Request - Invalid or missing tokens, token mismatch, or user not active
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INPUT_ERROR", "INVALID_TOKEN", "USER_NOT_ACTIVE"]
                        example: "INVALID_TOKEN"
                      errdata:
                        type: string
                        example: "Main token is required"
                  msg:
                    type: string
                    example: "Main token is required"
        "500":
          description: Internal Server Error - Failed to refresh token
  /api/v1/fms/user/updatepassword:
    post:
      tags:
        - FMS JS > FMS > User Profile
      summary: Update User Password
      description: Update the authenticated user's password by providing the current password and a new password. The new password must meet security requirements (8-128 characters) and cannot be the same as the old password. This will invalidate all existing user sessions for security.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldpassword
                - newpassword
              properties:
                oldpassword:
                  type: string
                  description: Current password for verification
                  
                newpassword:
                  type: string
                  minLength: 8
                  maxLength: 128
                  
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password has been updated successfully"
                  userid:
                    type: string
                    description: User ID whose password was updated
                  msg:
                    type: string
                    example: "Password updated successfully"
        "400":
          description: Bad Request - Invalid input, wrong old password, or same password error
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum: ["INPUT_ERROR", "INVALID_OLD_PASSWORD", "SAME_PASSWORD_ERROR"]
                        example: "INVALID_OLD_PASSWORD"
                      errdata:
                        type: object
                        description: Additional error details
                  msg:
                    type: string
                    example: "Invalid old password"
        "500":
          description: Internal Server Error - Failed to update password
  /api/v1/fms/user/banners:
    get:
      tags:
        - FMS JS > FMS > User Profile
      summary: Get User Banners
      description: Retrieve all enabled banners for display in the user interface. Returns banners ordered by priority and then by ID. Only enabled banners are returned.
