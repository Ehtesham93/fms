  /api/v1/fms/chargeinsights/vehicle/{vinno}/chargedistribution:
    get:
      tags:
        - FMS JS > FMS > ChargeInsight
      summary: Get Charge Distribution by Vehicle
      parameters:
        - name: vinno
          in: path
          required: true
          schema:
            type: string
            maxLength: 128
          description: "Vehicle VIN number (can contain spaces, will be URL encoded)"
          example: "NBJAS BD766T8"
        - name: timestamp
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d+$'
          description: |
            **REQUIRED**: Timestamp in milliseconds for the day to analyze (will be converted to start/end of day).
            This parameter is mandatory for the API to work.
          example: "1716150000000"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: "Charge distribution data retrieved successfully"
        content:
          application/json:
            schema:
              type: object
              properties:
                err:
                  type: "null"
                data:
                  type: object
                  properties:
                    totalchargingevents:
                      type: number
                      description: "Total number of charging events for the day"
                    totalvehicles:
                      type: number
                      example: 1
                    hourlydistribution:
                      type: object
                      description: "Number of charging sessions started in each hour (0-23)"
                      additionalProperties:
                        type: number
                      example:
                        "0": 0
                        "1": 0
                        "6": 2
                        "9": 1
                        "18": 3
                        "22": 1
                    durationdistribution:
                      type: object
                      description: "Distribution of charging sessions by duration"
                      properties:
                        less_than_30min:
                          type: number
                          example: 2
                        "30min_to_1hr":
                          type: number
                          example: 3
                        "1hr_to_2hr":
                          type: number
                          example: 1
                        "2hr_to_4hr":
                          type: number
                          example: 1
                        "4hr_to_8hr":
                          type: number
                          example: 0
                        "8hr_plus":
                          type: number
                          example: 0
                msg:
                  type: string
                  example: "Charge distribution retrieved successfully"
        "400":
          description: "Bad Request - Missing or invalid parameters"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        enum:
                          [
                            "MISSING_PARAMETERS",
                            "INVALID_TIMESTAMP",
                            "INPUT_ERROR",
                          ]
                      errdata:
                        type: string
                        example: "timestamp is required"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "timestamp is required"
        "403":
          description: "Forbidden - Authentication required"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "TOKEN_REQUIRED"
                  data:
                    type: "null"
                  msg:
                    type: string
        "500":
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                  data:
                    type: "null"
                  msg:
                    type: string
