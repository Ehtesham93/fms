        content:
          application/json:
            schema:
              type: object
              example:
                rolename: Customer Care Admin
                roletype: platform
                isenabled: true
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - FMS JS > Platform > Roles
      summary: Delete Role
      parameters:
        - in: path
          name: roleid
          required: true
          schema:
            type: string
            format: uuid
            description: Role ID to delete
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Successful response
