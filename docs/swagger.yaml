  /api/v1/fms/historydata/vehicle/{vinno}/gps:
    post:
      tags:
        - FMS JS > FMS > History Data
      summary: Get GPS History Data
      description: Retrieve GPS history data for a specific vehicle within a time range
      security:
        - cookieAuth: []
      parameters:
        - name: vinno
          in: path
          required: true
          schema:
            type: string
            maxLength: 128
          example: "MKMDJD7Y732282"
          description: "Vehicle VIN number"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["starttime", "endtime"]
              properties:
                starttime:
                  type: number
                  description: "Start time in milliseconds (timestamp)"
                  example: 1716150000000
                endtime:
                  type: number
                  description: "End time in milliseconds (timestamp)"
                  example: 1716236400000
      responses:
        "200":
          description: "GPS history data retrieved successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: array
                    description: "Array of GPS data points"
                  msg:
                    example: "GPS history data listed successfully"
        "400":
          description: "Bad Request - Invalid input parameters"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INPUT_ERROR"
                      errdata:
                        type: object
                  data:
                    type: "null"
                  msg:
                    type: string
        "403":
          description: "Forbidden - Authentication required"
        "500":
          description: "Internal Server Error"
  /api/v1/fms/historydata/vehicle/{vinno}/can:
    post:
      tags:
        - FMS JS > FMS > History Data
      summary: Get CAN History Data
      description: Retrieve CAN bus history data for a specific vehicle within a time range
      security:
        - cookieAuth: []
      parameters:
        - name: vinno
          in: path
          required: true
          schema:
            type: string
            maxLength: 128
          example: "MKMDJD7Y732282"
          description: "Vehicle VIN number"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["starttime", "endtime"]
              properties:
                starttime:
                  type: number
                  description: "Start time in milliseconds (timestamp)"
                  example: 1716150000000
                endtime:
                  type: number
                  description: "End time in milliseconds (timestamp)"
                  example: 1716236400000
                canparams:
                  type: array
                  items:
                    type: string
                    maxLength: 128
                  minItems: 1
                  description: "Optional array of specific CAN parameters to retrieve"
                  example:
                    [
                      "intime",
                      "valid",
                      "tstamp",
                      "cycletime",
                      "charger_sts_live",
                      "bms_charger_plug_in_sts",
                    ]
      responses:
        "200":
          description: "CAN history data retrieved successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: "null"
                  data:
                    type: array
                    description: "Array of CAN data points"
                  msg:
                    type: string
                    example: "CAN history data listed successfully"
        "400":
          description: "Bad Request - Invalid input parameters"
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: object
                    properties:
                      errcode:
                        type: string
                        example: "INPUT_ERROR"
                      errdata:
                        type: object
                  data:
                    type: "null"
                  msg:
                    type: string
        "403":
          description: "Forbidden - Authentication required"
        "500":
          description: "Internal Server Error"
