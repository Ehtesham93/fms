    put:
      tags:
        - FMS JS > Platform > Users
      summary: Reset User Password
      description: Reset password for a specific user. Only superadmin can reset user passwords.
      parameters:
        - in: path
          name: userid
          required: true
          schema:
            type: string
            format: uuid
            description: Target user ID whose password will be reset
          example: "0249f209-38e4-4e7b-ac6c-012a95467f21"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  minLength: 6
                  maxLength: 128
                  description: New password for the user (minimum 6 characters, maximum 128 characters)
              required:
                - password
              example:
                password: "NewSecurePassword123"
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Successful response
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    userid:
                      type: string
                      format: uuid
                      description: Target user ID
                    resetby:
                      type: string
                      format: uuid
                      description: User ID who performed the reset
                    message:
                      type: string
                      example: "Password reset successfully and email notification sent"
                msg:
                  type: string
                  example: "User password reset successfully"
        "400":
          description: Bad Request
          content:
          application/json:
            schema:
              type: object
              properties:
                err:
                  type: object
                  properties:
                    errcode:
                      type: string
                      example: INPUT_ERROR
                    errdata:
                    type: string
                    message:
                      type: string
                data:
                  type: "null"
        "403":
          description: Forbidden - Only superadmin can reset passwords
          content:
          application/json:
            schema:
              type: object
              properties:
                err:
                  type: object
                  properties:
                    errcode:
                      type: string
                      example: RESET_USER_PASSWORD_ERR
                    errdata:
                      type: string
                      example: "Only superadmin can reset user passwords"
                data:
                  type: "null"
