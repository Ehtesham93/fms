  - name: FMS JS > Platform
  - name: FMS JS > Platform > Module
  - name: FMS JS > Platform > Roles
  - name: FMS JS > Platform > Users
  - name: FMS JS > Platform > Packages
  - name: FMS JS > Platform > Accounts
  - name: FMS JS > Platform > Accounts > Packages
  - name: FMS JS > Platform > Accounts > Subscriptions
  - name: FMS JS > Platform > Accounts > Credits
  - name: FMS JS > Platform > Vehicles
  - name: FMS JS > Platform > Model
  - name: FMS JS > Platform > Model > Param
  - name: FMS JS > Platform > Model > Family
  - name: FMS JS > Platform > Model > Family > Param
  - name: FMS JS > User
  - name: FMS JS > User > Mobile
  - name: FMS JS > FMS
  - name: FMS JS > FMS > Modules
  # - name: FMS JS > FMS > Modules > ServiecMod (DEPRECATED)
  - name: FMS JS > FMS > AccountMangement
  - name: FMS JS > FMS > AccountMangement > Invite
  - name: FMS JS > FMS > AccountMangement > Fleet
  - name: FMS JS > FMS > AccountMangement > Fleet > Vehicle
  - name: FMS JS > FMS > AccountMangement > Fleet > User
  - name: FMS JS > FMS > AccountMangement > Role
  - name: FMS JS > FMS > AccountMangement > Subscription
  - name: FMS JS > FMS > Header Context
  - name: FMS JS > FMS > User Profile
  - name: FMS JS > FMS > History Data
