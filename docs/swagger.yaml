                        example: "INPUT_ERROR"
                      errdata:
                        type: string
                        example: "VIN number is required"
                  data:
                    type: "null"
                  msg:
                    type: string
                    example: "Invalid input data"
        "403":
          description: Forbidden - Account token authentication required
