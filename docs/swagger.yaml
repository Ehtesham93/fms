                            "MISSING_PARAMETERS",
                            "INVALID_TIMESTAMP",
                            "INPUT_ERROR",
                          ]
                      errdata:
                        type: string
                        example: "timestamp is required"
                  data:
                    type: "null"
                  msg:
                    type: string
