  /api/v1/fms/account/subscription/subscribe:
    post:
      tags:
        - FMS JS > FMS > AccountMangement > Subscription
      summary: Subscribe Vehicle
      description: Subscribe one or more vehicles to the account's subscription
      security:
        - cookieAuth: []
      requestBody:
        required: true
