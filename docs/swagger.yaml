                      type: string
                      format: uuid
                      description: Target user ID
                    resetby:
                      type: string
                      format: uuid
                      description: User ID who performed the reset
                    message:
                      type: string
                      example: "Password reset successfully and email notification sent"
                msg:
                  type: string
                  example: "User password reset successfully"
        "400":
          description: Bad Request
          content:
          application/json:
            schema:
              type: object
              properties:
                err:
                  type: object
                  properties:
                    errcode:
                      type: string
                      example: INPUT_ERROR
                    errdata:
                    type: string
                    message:
                      type: string
                data:
                  type: "null"
        "403":
          description: Forbidden - Only superadmin can reset passwords
          content:
          application/json:
            schema:
              type: object
              properties:
                err:
                  type: object
                  properties:
                    errcode:
                      type: string
                      example: RESET_USER_PASSWORD_ERR
